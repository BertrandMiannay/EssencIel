name: carburants-ingestion-twice-daily
description: "Déclenche la Cloud Function d'ingestion des prix carburants deux fois par jour (minuit et midi)"
schedule: "0 0,12 * * *"
timeZone: "Europe/Paris"
httpTarget:
  uri: ${CLOUD_FUNCTION_URL}
  httpMethod: POST
  oidcToken:
    serviceAccountEmail: ${SERVICE_ACCOUNT_EMAIL}
retryConfig:
  retryCount: 3
  minBackoffDuration: 5s
  maxBackoffDuration: 3600s
  maxDoublings: 5
