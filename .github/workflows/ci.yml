name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    name: Lint & Tests
    runs-on: ubuntu-latest

    env:
      GCP_PROJECT: test-project
      GCS_BUCKET: test-bucket
      SECRET_KEY: test-secret-key-for-ci
      BQ_DATASET: carburants

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install \
            "django>=4.2,<5.0" \
            "djangorestframework>=3.17.1,<4.0.0" \
            "google-cloud-bigquery>=3.41.0,<4.0.0" \
            "google-cloud-storage>=3.10.1,<4.0.0" \
            "requests>=2.34.1" \
            "python-dotenv>=1.2.2" \
            "pytest>=8.0" \
            "pytest-django>=4.9" \
            "ruff>=0.9"

      - name: Lint (ruff)
        run: ruff check .

      - name: Tests
        run: pytest tests/ -v
