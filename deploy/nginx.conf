server {
    listen 80;
    server_name <domaine>;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name <domaine>;

    ssl_certificate /etc/letsencrypt/live/<domaine>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<domaine>/privkey.pem;

    location /static/ {
        alias /home/<your-user>/EssencIel/web/staticfiles/;
    }

    location / {
        proxy_pass http://unix:/run/essenciel/gunicorn.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
